name: Scheduled Job Search

on:
  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      notify:
        description: 'Send notifications'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: '3.11'

jobs:
  search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Restore seen jobs cache
        uses: actions/cache@v4
        with:
          path: .seen_jobs.json
          key: seen-jobs-${{ github.run_number }}
          restore-keys: |
            seen-jobs-
      
      - name: Run job search
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python run_scheduled.py
      
      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: search-results-${{ github.run_number }}
          path: |
            .seen_jobs.json
          retention-days: 7

  # Optional: Post summary to GitHub Issues
  post-summary:
    needs: search
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Create summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Job Search Summary - ${date}`,
              body: `## Scheduled Job Search Results\n\nRun completed at: ${new Date().toISOString()}\n\nCheck the workflow run for detailed results.`,
              labels: ['job-search', 'automated']
            });
